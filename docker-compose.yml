services:
  app:
    build: .
    container_name: arise-app
    restart: unless-stopped
    environment:
      - DATABASE_URL=file:/data/arise.db
      - SYSTEM_CRON_SECRET=${SYSTEM_CRON_SECRET:-change-me}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@leveling.matthomelab.tech}
    volumes:
      - arise-data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.arise.rule=Host(`leveling.matthomelab.tech`)"
      - "traefik.http.routers.arise.entrypoints=websecure"
      - "traefik.http.routers.arise.tls.certresolver=letsencrypt"
      - "traefik.http.services.arise.loadbalancer.server.port=3000"

volumes:
  arise-data:
